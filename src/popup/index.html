<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better WebClass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Better WebClass</h1>
      </header>

      <section class="section">
        <h2>WebClass URL</h2>
        <div class="field">
          <div class="field-header">
            <label for="webclass-url">あなたの大学の WebClass URL</label>
            <button id="use-current-tab-btn" class="btn btn-secondary btn-sm" type="button">現在のページを使用</button>
          </div>
          <input
            type="url"
            id="webclass-url"
            placeholder="https://webclass.example.ac.jp"
          />
          <p class="hint">
            拡張機能を有効にしたいドメインを入力してください。
          </p>
        </div>
      </section>

      <section class="section">
        <h2>機能設定</h2>

        <label class="toggle">
          <input type="checkbox" id="enable-file-handler" />
          <span class="toggle-track"></span>
          <span class="toggle-label">
            <strong>ファイルハンドラ</strong>
            <small>ポップアップウィンドウを廃止し、PDF をその場で表示</small>
          </span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="enable-ui-enhancer" />
          <span class="toggle-track"></span>
          <span class="toggle-label">
            <strong>UI 改善</strong>
            <small>テーブルを見やすくし、ナビゲーションを追加</small>
          </span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="enable-assignment-tracker" />
          <span class="toggle-track"></span>
          <span class="toggle-label">
            <strong>課題トラッカー</strong>
            <small>締め切りまでの残日数をバッジで表示</small>
          </span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="enable-auto-refresh" />
          <span class="toggle-track"></span>
          <span class="toggle-label">
            <strong>自動更新</strong>
            <small>バックグラウンドでコースを巡回しデータを更新</small>
          </span>
        </label>

        <div class="field indent" id="auto-refresh-interval-field">
          <label for="auto-refresh-interval">更新間隔</label>
          <select id="auto-refresh-interval">
            <option value="60">1時間ごと</option>
            <option value="180">3時間ごと</option>
            <option value="360">6時間ごと</option>
            <option value="540">9時間ごと</option>
            <option value="720">12時間ごと</option>
          </select>
        </div>

      </section>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary">保存</button>
        <button id="refresh-now-btn" class="btn btn-secondary">今すぐ更新</button>
        <span id="save-status" class="save-status" hidden></span>
      </div>

      <div id="refresh-progress" class="refresh-progress" hidden></div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
